<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>MTB Builder - Login</title>
    <!-- Shared header/nav bar styles -->
    <link rel="stylesheet" href="styles/header.css">
    <!-- Login and signup shared styles -->
    <link rel="stylesheet" href="styles/login-signup-styles.css">
</head>

<!-- Navigation header: back button and logo (no basket or account buttons on this page) -->
<header>
    <!-- Back button (left) -->
    <a href="index.html" class="header-button back-button">
        BACK
    </a>
    <!-- Center logo -->
    <img src="images/Logos/main-logo.png" class="header-logo" alt="MTB Builder">
</header>

<body>
    <div class="main-container">
        <div>
            <h1>LOGIN</h1>
        </div>

        <!--LOGIN FORM HTML-->
        <form id="LoginForm">
            <div>
                <label>Email</label>
                <br />
                <!-- type="email" provides basic browser-level format validation -->
                <input class="FormBox" type="email" id="email" required />
            </div>
            <br />
            <div>
                <label>Password</label>
                <br />
                <input class="FormBox" type="password" id="password" required />
            </div>
            <br />
            <i>Don't have an account? </i><a href="signup.html"><i>Sign up here</i></a>
            <br />
            <button class="SubmitButton" type="submit">LOGIN</button>
        </form>
    </div>

    <!--JAVASCRIPT-->
    <script>
        document.getElementById("LoginForm").addEventListener("submit", function (e) {
            e.preventDefault();  // Prevent default form submission and page reload

            // Convert email to lowercase so login is not case-sensitive
            const LoginEmail = document.getElementById("email").value.toLowerCase(); //also convert to lowercase so email isnt case sensitive
            const LoginPassword = document.getElementById("password").value;

            const data = {
                email: LoginEmail,
                password: LoginPassword
            };

            console.log("Email:", LoginEmail);
            console.log("Password:", LoginPassword);

            // CHECK IF ACCOUNT INFORMATION MATCHES DATABASE (AuthController.cs)
            // The backend hashes the submitted password and compares it to the stored hash
            fetch("https://localhost:7165/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(res => {
                    if (res.ok) {
                        alert("Login Sucessful")
                        //redirect to homepage
                        window.location.href = "index.html";
                    } else {
                        // Non-200 response means credentials did not match
                        alert("Login Failed. Please check your credentials.");
                    }
                })
                .catch(err => {
                    console.error("Login Failed:", err);
                    alert("An error occurred during login.");
                });
        });
    </script>
</body>
</html>
